<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Knowledge Graph | After the Grind</title>
<meta name="description" content="An interactive map of the ideas, research, archetypes, and people behind After the Grind by Andrew Perkins">
<meta property="og:title" content="Knowledge Graph | After the Grind">
<meta property="og:description" content="Explore the interconnected ideas behind After the Grind: 10 archetypes, 25 years of research, the 4I Framework, and more.">
<meta property="og:type" content="website">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a0a0f;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;color:#eee}
  canvas{display:block;position:fixed;top:0;left:0}
  #tooltip{position:fixed;background:rgba(15,15,25,.95);color:#eee;padding:14px 18px;border-radius:10px;font-size:14px;pointer-events:none;display:none;max-width:380px;border:1px solid rgba(255,255,255,.12);backdrop-filter:blur(8px);z-index:100;line-height:1.5}
  #tooltip .type{color:#888;font-size:11px;text-transform:uppercase;letter-spacing:1.5px;font-weight:500}
  #tooltip .name{font-size:18px;font-weight:700;margin:4px 0}
  #tooltip .desc{color:#aaa;font-size:13px;margin-top:6px;line-height:1.4}
  #tooltip .conns{color:#666;font-size:11px;margin-top:8px}
  #header{position:fixed;top:0;left:0;right:0;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;z-index:50;background:linear-gradient(180deg,rgba(10,10,15,.9) 0%,rgba(10,10,15,0) 100%);pointer-events:none}
  #header *{pointer-events:auto}
  #header h1{font-size:20px;font-weight:700;letter-spacing:-.3px}
  #header h1 a{color:#eee;text-decoration:none}
  #header h1 span{color:#4fc3f7;font-weight:400}
  #header p{color:#555;font-size:12px;margin-top:2px}
  #search{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:#eee;padding:8px 16px;border-radius:20px;font-size:13px;width:260px;outline:none;transition:border-color .2s}
  #search:focus{border-color:rgba(79,195,247,.5)}
  #search::placeholder{color:#555}
  #legend{position:fixed;top:70px;right:12px;background:rgba(15,15,25,.88);padding:14px;border-radius:10px;border:1px solid rgba(255,255,255,.08);max-height:calc(100vh - 90px);overflow-y:auto;z-index:50}
  #legend h3{color:#aaa;font-size:11px;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
  .li{display:flex;align-items:center;gap:8px;margin:4px 0;color:#aaa;font-size:12px;cursor:pointer;user-select:none;transition:color .15s}
  .li:hover{color:#fff}.li.dim{opacity:.25}
  .ld{width:10px;height:10px;border-radius:50%;flex-shrink:0}
  #stats{position:fixed;bottom:12px;left:12px;color:#333;font-size:11px;z-index:50}
  #cta{position:fixed;bottom:12px;right:12px;z-index:50}
  #cta a{background:rgba(79,195,247,.15);color:#4fc3f7;text-decoration:none;padding:8px 16px;border-radius:20px;font-size:12px;border:1px solid rgba(79,195,247,.3);transition:all .2s}
  #cta a:hover{background:rgba(79,195,247,.25)}
  #zc{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);display:flex;gap:6px;z-index:50}
  #zc button{background:rgba(255,255,255,.1);color:#aaa;border:none;width:36px;height:36px;border-radius:8px;cursor:pointer;font-size:18px;transition:all .15s}
  #zc button:hover{background:rgba(255,255,255,.2);color:#fff}
</style>
</head>
<body>
<div id="header">
  <div>
    <h1><a href="/">After the Grind</a> <span>/ Knowledge Graph</span></h1>
    <p>An interactive map of ideas, research, and archetypes</p>
  </div>
  <input id="search" type="text" placeholder="Search nodes...">
</div>
<div id="tooltip"></div>
<div id="legend"><h3>Node Types</h3></div>
<div id="zc"><button id="zin">+</button><button id="zout">−</button><button id="zfit">⊞</button></div>
<div id="stats"></div>
<div id="cta"><a href="https://www.amazon.com/dp/B0GHT7DN7F" target="_blank">📖 Get the Book</a></div>
<script>
const C=document.createElement('canvas');
C.width=window.innerWidth;C.height=window.innerHeight;
document.body.prepend(C);
const X=C.getContext('2d');
let W=C.width,H=C.height;

const COL={
  Archetype:"#aed581",Person:"#f06292",Essay:"#4fc3f7",Paper:"#80cbc4",
  Concept:"#ff8a65",Dimension:"#ffd54f",Chapter:"#4db6ac",
  Source:"#a1887f",Organization:"#ce93d8",Book:"#ffb74d"
};
const SZ={
  Book:20,Dimension:16,Archetype:14,Chapter:10,
  Paper:8,Person:7,Essay:7,Concept:6,
  Organization:4,Source:4
};
const LABELS={
  Book:"Books",Dimension:"4I Dimensions",Archetype:"Archetypes",Chapter:"Chapters",
  Paper:"Research Papers",Person:"People",Essay:"Essays",Concept:"Concepts",
  Organization:"Organizations",Source:"Journals & Sources"
};

let tx=0,ty=0,tk=1;
let nodes=[],links=[],nodeMap={};
let hidden=new Set();
let searchQ='',hoverN=null,dragN=null,connSet=new Set();
let simulating=true,alpha=1;

function initPos(){
  const cx=W/2,cy=H/2;
  nodes.forEach((n,i)=>{
    const a=(i/nodes.length)*Math.PI*2;
    const r=150+Math.random()*300;
    n.x=cx+Math.cos(a)*r;n.y=cy+Math.sin(a)*r;n.vx=0;n.vy=0;
  });
}

function simulate(){
  if(!simulating)return;
  const vis=nodes.filter(n=>!hidden.has(n.label));
  const cx=W/2,cy=H/2;
  for(let i=0;i<vis.length;i++){
    const a=vis[i];
    for(let j=i+1;j<vis.length;j++){
      const b=vis[j];
      let dx=b.x-a.x,dy=b.y-a.y,d2=dx*dx+dy*dy;
      if(d2>640000)continue;if(d2<1)d2=1;
      const f=-500/d2;
      a.vx-=dx*f;a.vy-=dy*f;b.vx+=dx*f;b.vy+=dy*f;
    }
    a.vx+=(cx-a.x)*0.0005;a.vy+=(cy-a.y)*0.0005;
  }
  links.forEach(l=>{
    if(hidden.has(l.source.label)||hidden.has(l.target.label))return;
    let dx=l.target.x-l.source.x,dy=l.target.y-l.source.y;
    let d=Math.sqrt(dx*dx+dy*dy)||1,f=(d-100)*0.003;
    l.source.vx+=dx/d*f;l.source.vy+=dy/d*f;
    l.target.vx-=dx/d*f;l.target.vy-=dy/d*f;
  });
  vis.forEach(n=>{
    if(n===dragN)return;
    n.vx*=0.8;n.vy*=0.8;n.x+=n.vx;n.y+=n.vy;
  });
  alpha*=0.98;if(alpha<0.001){simulating=false;alpha=0;}
}

function draw(){
  X.clearRect(0,0,W,H);X.save();X.translate(tx,ty);X.scale(tk,tk);
  const sq=searchQ.toLowerCase(),hl=hoverN!=null;
  links.forEach(l=>{
    if(hidden.has(l.source.label)||hidden.has(l.target.label))return;
    let a=0.1;if(hl)a=(connSet.has(l.source.id)&&connSet.has(l.target.id))?0.6:0.01;
    X.strokeStyle=`rgba(120,120,140,${a})`;X.lineWidth=0.6;
    X.beginPath();X.moveTo(l.source.x,l.source.y);X.lineTo(l.target.x,l.target.y);X.stroke();
  });
  nodes.forEach(n=>{
    if(hidden.has(n.label))return;
    const r=SZ[n.label]||5,c=COL[n.label]||'#888';
    let a=1;
    if(sq&&!(n.name||'').toLowerCase().includes(sq))a=0.05;
    if(hl&&!connSet.has(n.id))a=0.04;
    X.globalAlpha=a;X.shadowColor=c;X.shadowBlur=r>8?8:4;
    X.fillStyle=c;X.beginPath();X.arc(n.x,n.y,r,0,Math.PI*2);X.fill();
    X.shadowBlur=0;
    if(tk>0.35&&r>=5&&n.name){
      X.fillStyle=`rgba(220,220,220,${a*0.75})`;
      X.font=`${Math.max(8,Math.min(11,r+1))}px -apple-system,sans-serif`;
      X.textAlign='center';
      X.fillText(n.name.length>24?n.name.slice(0,22)+'..':n.name,n.x,n.y+r+13);
    }
    X.globalAlpha=1;
  });
  X.restore();
}

function loop(){simulate();draw();if(simulating||dragN)requestAnimationFrame(loop);}
function wake(a){alpha=a||0.3;if(!simulating){simulating=true;requestAnimationFrame(loop);}}
function redraw(){draw();}

function s2w(sx,sy){return{x:(sx-tx)/tk,y:(sy-ty)/tk};}
function findN(sx,sy){
  const{x,y}=s2w(sx,sy);let cl=null,md=Infinity;
  nodes.forEach(n=>{if(hidden.has(n.label))return;const r=(SZ[n.label]||5)+5;const d=Math.hypot(n.x-x,n.y-y);if(d<r&&d<md){cl=n;md=d;}});
  return cl;
}

C.addEventListener('wheel',e=>{e.preventDefault();const f=e.deltaY>0?.9:1.1;tx=e.clientX-(e.clientX-tx)*f;ty=e.clientY-(e.clientY-ty)*f;tk*=f;redraw();},{passive:false});
let panning=false,ps={x:0,y:0};
C.addEventListener('pointerdown',e=>{const n=findN(e.clientX,e.clientY);if(n){dragN=n;dragN.vx=0;dragN.vy=0;wake(.1);}else{panning=true;ps={x:e.clientX-tx,y:e.clientY-ty};}});
C.addEventListener('pointermove',e=>{
  if(dragN){const w=s2w(e.clientX,e.clientY);dragN.x=w.x;dragN.y=w.y;dragN.vx=0;dragN.vy=0;}
  else if(panning){tx=e.clientX-ps.x;ty=e.clientY-ps.y;redraw();}
  const n=findN(e.clientX,e.clientY);
  if(n!==hoverN){
    hoverN=n;connSet.clear();
    if(n){connSet.add(n.id);links.forEach(l=>{if(l.source.id===n.id)connSet.add(l.target.id);if(l.target.id===n.id)connSet.add(l.source.id);});
      const tt=document.getElementById('tooltip');tt.style.display='block';
      const typeLabel=LABELS[n.label]||n.label;
      tt.innerHTML=`<div class="type">${typeLabel}</div><div class="name">${n.name||''}</div>${n.description?'<div class="desc">'+n.description+'</div>':''}<div class="conns">${connSet.size-1} connections</div>`;
      tt.style.left=(e.clientX+15)+'px';tt.style.top=(e.clientY-10)+'px';
    }else{document.getElementById('tooltip').style.display='none';}
    redraw();
  }else if(n){const tt=document.getElementById('tooltip');tt.style.left=(e.clientX+15)+'px';tt.style.top=(e.clientY-10)+'px';}
});
C.addEventListener('pointerup',()=>{dragN=null;panning=false;});
let ltd=0;
C.addEventListener('touchstart',e=>{if(e.touches.length===2){const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;ltd=Math.hypot(dx,dy);}},{passive:true});
C.addEventListener('touchmove',e=>{if(e.touches.length===2){e.preventDefault();const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;const d=Math.hypot(dx,dy),f=d/ltd;const mx=(e.touches[0].clientX+e.touches[1].clientX)/2,my=(e.touches[0].clientY+e.touches[1].clientY)/2;tx=mx-(mx-tx)*f;ty=my-(my-ty)*f;tk*=f;ltd=d;redraw();}},{passive:false});

document.getElementById('zin').onclick=()=>{tk*=1.3;redraw();};
document.getElementById('zout').onclick=()=>{tk*=.7;redraw();};
document.getElementById('zfit').onclick=()=>{
  const vis=nodes.filter(n=>!hidden.has(n.label));if(!vis.length)return;
  let x0=Infinity,x1=-Infinity,y0=Infinity,y1=-Infinity;
  vis.forEach(n=>{x0=Math.min(x0,n.x);x1=Math.max(x1,n.x);y0=Math.min(y0,n.y);y1=Math.max(y1,n.y);});
  const p=80;tk=Math.min(W/(x1-x0+p*2),H/(y1-y0+p*2),3);
  tx=W/2-((x0+x1)/2)*tk;ty=H/2-((y0+y1)/2)*tk;redraw();
};
document.getElementById('search').addEventListener('input',function(){searchQ=this.value;redraw();});
window.addEventListener('resize',()=>{C.width=W=innerWidth;C.height=H=innerHeight;redraw();});

fetch('/data/graph.json').then(r=>r.json()).then(data=>{
  nodes=data.nodes;links=data.links;
  nodes.forEach(n=>nodeMap[n.id]=n);
  links.forEach(l=>{if(typeof l.source!=='object')l.source=nodeMap[l.source];if(typeof l.target!=='object')l.target=nodeMap[l.target];});
  links=links.filter(l=>l.source&&l.target);
  const types=[...new Set(nodes.map(n=>n.label))].sort((a,b)=>(SZ[b]||5)-(SZ[a]||5));
  const leg=document.getElementById('legend');
  types.forEach(t=>{
    const cnt=nodes.filter(n=>n.label===t).length;
    const d=document.createElement('div');d.className='li';
    d.innerHTML=`<div class="ld" style="background:${COL[t]||'#888'}"></div>${LABELS[t]||t} (${cnt})`;
    d.onclick=()=>{if(hidden.has(t))hidden.delete(t);else hidden.add(t);d.classList.toggle('dim');wake(.5);};
    leg.appendChild(d);
  });
  document.getElementById('stats').textContent=`${nodes.length} nodes · ${links.length} connections · Built by OCPI4`;
  initPos();requestAnimationFrame(loop);
  setTimeout(()=>document.getElementById('zfit').click(),3000);
});
</script>
</body>
</html>
